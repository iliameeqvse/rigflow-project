services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rigflow
      POSTGRES_USER: rigflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rigflow123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rigflow", "-d", "rigflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  # ── Django web server ──────────────────────────────────────────────────────
  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 rigflow.asgi:application"
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ../backend:/app
      - static_vol:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    command: >
      celery -A rigflow worker
        --loglevel=info
        --concurrency=2
        -Q default,rigging,animations
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      BLENDER_PATH: /usr/bin/blender
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - redis

  # ── Celery Beat ────────────────────────────────────────────────────────────
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A rigflow beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
    depends_on:
      - db
      - redis

  # ── Flower ─────────────────────────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A rigflow flower --port=5555 --broker=redis://redis:6379/0
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - web

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_vol:/static:ro
    depends_on:
      - web
      - frontend

volumes:
  pgdata:
  static_vol: