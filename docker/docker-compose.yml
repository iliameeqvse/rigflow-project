services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rigflow
      POSTGRES_USER: rigflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rigflow123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rigflow", "-d", "rigflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  # ── Django web server ──────────────────────────────────────────────────────
  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 rigflow.asgi:application"
    env_file:
      - ../backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ../backend:/app
      # STATIC_ROOT in base.py resolves to /staticfiles inside the container
      # (BASE_DIR.parent / "staticfiles"). collectstatic writes there; the
      # named volume keeps the output across container restarts.
      - static_vol:/staticfiles
      # MEDIA_ROOT resolves to /media. This volume is also mounted on celery
      # so the worker can read uploaded files written by the web request.
      - media_vol:/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    command: >
      celery -A rigflow worker
        --loglevel=info
        --concurrency=2
        -Q default,rigging,animations
    env_file:
      - ../backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      # BLENDER_PATH is set by Dockerfile.celery (Blender 5.0.1 tarball at
      # /usr/local/bin/blender). Don't override here.
    volumes:
      - ../backend:/app
      - media_vol:/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat ────────────────────────────────────────────────────────────
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A rigflow beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower ─────────────────────────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A rigflow flower --port=5555 --broker=redis://redis:6379/0
    environment:
      DJANGO_SETTINGS_MODULE: rigflow.settings.production
      DATABASE_URL: postgres://rigflow:${DB_PASSWORD:-rigflow123}@db:5432/rigflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-123}
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* values must be passed as build args because Next.js
      # inlines them into the client bundle at build time. Setting them
      # under `environment:` below would silently do nothing for the
      # browser-side code.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        # NEXT_PUBLIC_WS_URL is intentionally not defaulted: backend asgi.py
        # is plain get_asgi_application() with no Channels routing, so
        # opening a WS to /ws/rig/<id>/ would 404 every editor mount. The
        # frontend falls back to polling /status/ when this env var is unset.
        # Set NEXT_PUBLIC_WS_URL once a Channels consumer is wired in
        # rigflow.asgi (and the consumer publishes to group user_{user_id}).
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      - web

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_vol:/static:ro
      - media_vol:/media:ro
    depends_on:
      - web
      - frontend

volumes:
  pgdata:
  static_vol:
  media_vol:
