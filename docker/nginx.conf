upstream django_backend {
    server web:8000;
}

upstream nextjs_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;

    # Allow large file uploads (match Django's 100MB limit)
    client_max_body_size 110M;

    # Serve user uploads directly from the shared media volume.
    # The web and celery containers both write here; nginx reads from
    # the same volume so we skip Django on hot asset paths.
    location /media/ {
        alias /media/;
        access_log off;
        # Slightly forgiving caching — rigged GLBs are immutable per
        # rig_id but we cache-bust via ?v=<updated_at> from Django.
        expires 1h;
    }

    # Serve collectstatic output (admin, DRF browsable API).
    location /static/ {
        alias /static/;
        access_log off;
        expires 7d;
    }

    # Django API, admin, and Channels WebSocket routes.
    location ~ ^/(api|admin|ws)/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Everything else goes to Next.js (the app routes).
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
